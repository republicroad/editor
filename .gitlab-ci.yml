#------------------------- 北京DEV测试环境发布start
dev-build:
  stage: build
  variables:
    DOCKER_HOST: tcp://172.22.65.53:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    #GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - docker login ${REGISTRY_URL} -u "$DOCKER_USER" -p "$DOCKER_PASS"
    # - which git || (apk --no-cache add git)
    # - if [ -d ./jdm-editor ];then git rm -r ./jdm-editor;fi
    # - git submodule add -b jdm-editor-restyle ../../public/jdm-editor.git
    # - cat .gitmodules
    # - ls -ltra ./jdm-editor
  script:
    - CI_COMMIT_TAG=$(cat version)
    - docker build --network host --build-arg PYPI_IP=172.16.30.51 --cache-from ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:latest --tag ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:dev .
    #- sleep 999999
    - docker push ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:dev
  after_script:
    - docker logout ${REGISTRY_URL}
  tags:
    - "docker"
  only:
    changes:
      - version
    refs:
      - enhance_v2
  except:
    - tags



dev-deploy:
  stage: deploy
  image: registry.cn-qingdao.aliyuncs.com/geetest_cb/kubectl:v1.27.5
  variables:
    KUBE_CONFIG: "$KUBE_CONFIG_HSBJ_DEV"
    ingress: "custom-rule-dev.geevisit.com/rules/newflowchart"
  before_script:
    - mkdir -p ~/.kube && cat "$KUBE_CONFIG" > ~/.kube/config
    - echo '101.126.27.179 hsbj-dev-cn-k8s.gtapp.xyz' >> /etc/hosts
  script:
    - CI_COMMIT_REF_NAME=dev-$(cat version)
    - echo $CI_COMMIT_REF_NAME
    - if kubectl get deployments.apps ${namecb} -o yaml|grep image:|grep "${namecb}:dev" &>/dev/null;then kubectl set env deployments ${namecb} DEPLOY_DATE="$(date)" ;else kubectl set image deployment/${namecb} ${namecb}=registry.cn-hangzhou.aliyuncs.com/kae/${namecb}:dev --record;fi
    - sed -ri 's+dl-cdn.alpinelinux.org+mirrors.aliyun.com+g' /etc/apk/repositories
    - apk add --no-cache curl ca-certificates
    - update-ca-certificates
    - echo ''|base64 -d|sh -s "${namecb}测试环境发布完成${ingress}" "c42aa6ed-809d-4e8b-995d-90e7077804ec"
  after_script:
    - rm -f ~/.kube/config
  only:
    changes:
      - version
    refs:
      - enhance_v2
  except:
    - tags
#------------------------- 北京DEV测试环境发布end



build:
  stage: build
  variables:
    DOCKER_HOST: tcp://172.22.65.53:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login ${REGISTRY_URL} -u "$DOCKER_USER" -p "$DOCKER_PASS"
  script:
    - docker build --network host --build-arg PYPI_IP=172.16.30.51 --cache-from ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:latest --tag ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:$CI_COMMIT_TAG --tag ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:latest .
    - docker push ${REGISTRY_URL}/${REGISTRY_NS}/${namecb}:$CI_COMMIT_TAG
  after_script:
    - docker logout ${REGISTRY_URL}
  tags:
    - "docker"
  only:
    - tags


